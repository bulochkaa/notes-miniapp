<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Заметки</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ──────────────────── CSS Variables ──────────────────── */
  :root {
    --bg:        var(--tg-theme-bg-color,        #0f0f13);
    --bg2:       var(--tg-theme-secondary-bg-color, #1a1a22);
    --text:      var(--tg-theme-text-color,       #f0f0f5);
    --hint:      var(--tg-theme-hint-color,       #6b6b80);
    --accent:    var(--tg-theme-button-color,     #6c63ff);
    --accent-t:  var(--tg-theme-button-text-color,#ffffff);
    --link:      var(--tg-theme-link-color,       #a89cff);
    --radius:    16px;
    --radius-sm: 10px;
    --font:      'Onest', sans-serif;
    --safe-b:    env(safe-area-inset-bottom, 0px);
  }

  /* ──────────────────── Reset ──────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ──────────────────── Layout ──────────────────── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    position: relative;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transform: translateX(24px);
    transition: opacity .25s ease, transform .25s ease;
    overflow: hidden;
  }
  .screen.active {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }
  .screen.slide-out {
    opacity: 0;
    transform: translateX(-24px);
  }

  /* ──────────────────── Scrollable area ──────────────────── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 16px calc(80px + var(--safe-b));
    scrollbar-width: none;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ──────────────────── Header ──────────────────── */
  .header {
    padding: 16px 16px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    z-index: 2;
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.4px;
    flex: 1;
  }
  .header-sub {
    font-size: 13px;
    color: var(--hint);
    margin-top: 1px;
  }
  .back-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--bg2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .15s;
    flex-shrink: 0;
  }
  .back-btn:active { opacity: .6; }

  /* ──────────────────── Search bar ──────────────────── */
  .search-wrap {
    padding: 6px 16px 10px;
    position: relative;
  }
  .search-input {
    width: 100%;
    height: 40px;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--bg2);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    padding: 0 40px 0 38px;
    outline: none;
    transition: box-shadow .2s;
  }
  .search-input:focus { box-shadow: 0 0 0 2px var(--accent)44; }
  .search-input::placeholder { color: var(--hint); }
  .search-icon {
    position: absolute;
    left: 27px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
  }
  .search-clear {
    position: absolute;
    right: 26px; top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    cursor: pointer;
    color: var(--hint);
    background: none;
    border: none;
    line-height: 1;
    display: none;
  }
  .search-input:not(:placeholder-shown) ~ .search-clear { display: block; }

  /* ──────────────────── Category grid ──────────────────── */
  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .cat-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 18px 16px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    position: relative;
    overflow: hidden;
    border: 1.5px solid transparent;
  }
  .cat-card:active { transform: scale(.97); }
  .cat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cat-color, var(--accent));
    opacity: .08;
    transition: opacity .2s;
  }
  .cat-card:active::before { opacity: .15; }

  .cat-emoji {
    font-size: 28px;
    line-height: 1;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.3));
  }
  .cat-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: block;
    margin-bottom: 4px;
  }
  .cat-count {
    font-size: 12px;
    color: var(--hint);
    display: block;
  }
  .cat-dot {
    position: absolute;
    top: 12px; right: 12px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--cat-color, var(--accent));
    opacity: .6;
  }

  /* ──────────────────── Stats section ──────────────────── */
  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-pill {
    flex: 1;
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 14px;
    text-align: center;
  }
  .stat-pill .num {
    font-size: 24px;
    font-weight: 700;
    display: block;
    color: var(--accent);
    letter-spacing: -.5px;
  }
  .stat-pill .lbl {
    font-size: 11px;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* ──────────────────── Section label ──────────────────── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin: 20px 0 10px;
  }

  /* ──────────────────── Record list ──────────────────── */
  .records-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .record-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: transform .15s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    border: 1.5px solid transparent;
    position: relative;
    overflow: hidden;
  }
  .record-card:active { transform: scale(.98); }
  .record-card.has-photo .record-thumb {
    width: 60px; height: 60px;
    border-radius: 10px;
    object-fit: cover;
    flex-shrink: 0;
    background: var(--bg);
  }
  .record-body { flex: 1; min-width: 0; }
  .record-cat-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 4px;
  }
  .record-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .record-desc {
    font-size: 13px;
    color: var(--hint);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }
  .record-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  .record-stars { font-size: 11px; letter-spacing: -1px; }
  .record-tags {
    font-size: 11px;
    color: var(--link);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .record-date { font-size: 11px; color: var(--hint); margin-left: auto; }

  /* ──────────────────── Record detail ──────────────────── */
  .detail-photo {
    width: 100%;
    max-height: 220px;
    object-fit: cover;
    border-radius: var(--radius);
    margin-bottom: 16px;
    display: block;
  }

  .detail-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.3px;
    margin-bottom: 6px;
  }

  .detail-cat {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent)22;
    color: var(--link);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 16px;
  }

  .detail-stars {
    font-size: 20px;
    letter-spacing: -2px;
    margin-bottom: 16px;
    display: block;
  }

  .detail-block {
    background: var(--bg2);
    border-radius: var(--radius-sm);
    padding: 14px;
    margin-bottom: 10px;
  }
  .detail-block-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 6px;
  }
  .detail-block-text {
    font-size: 15px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .detail-link {
    color: var(--link);
    text-decoration: none;
    word-break: break-all;
  }
  .detail-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag-pill {
    background: var(--accent)1a;
    color: var(--link);
    font-size: 12px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .detail-date {
    font-size: 12px;
    color: var(--hint);
    text-align: center;
    margin-top: 6px;
    margin-bottom: 16px;
  }
  .detail-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .btn {
    flex: 1;
    height: 48px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn:active { opacity: .8; transform: scale(.98); }
  .btn-primary { background: var(--accent); color: var(--accent-t); }
  .btn-danger  { background: #ff4444; color: #fff; }
  .btn-ghost   { background: var(--bg2); color: var(--text); }

  /* ──────────────────── Add form ──────────────────── */
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: .6px;
    display: block;
    margin-bottom: 7px;
  }
  .form-input, .form-textarea, .form-select {
    width: 100%;
    background: var(--bg2);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color .2s;
  }
  .form-input:focus,
  .form-textarea:focus,
  .form-select:focus { border-color: var(--accent); }
  .form-input::placeholder,
  .form-textarea::placeholder { color: var(--hint); }
  .form-textarea {
    resize: none;
    min-height: 100px;
    line-height: 1.6;
  }
  .form-select option { background: #1a1a22; }

  /* Star rating picker */
  .star-picker {
    display: flex;
    gap: 6px;
  }
  .star-btn {
    font-size: 28px;
    background: none;
    border: none;
    cursor: pointer;
    line-height: 1;
    filter: grayscale(1) opacity(.4);
    transition: filter .15s, transform .1s;
    padding: 2px;
  }
  .star-btn.active,
  .star-btn:hover { filter: grayscale(0) opacity(1); }
  .star-btn:active { transform: scale(.85); }

  /* Category picker */
  .cat-picker {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .cat-pick-btn {
    background: var(--bg2);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    padding: 11px 10px;
    cursor: pointer;
    text-align: left;
    transition: border-color .2s, background .15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cat-pick-btn.selected {
    border-color: var(--accent);
    background: var(--accent)1a;
    color: var(--link);
  }

  /* ──────────────────── Bottom nav ──────────────────── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    height: calc(60px + var(--safe-b));
    padding-bottom: var(--safe-b);
    background: var(--bg2);
    border-top: 1px solid rgba(255,255,255,.06);
    display: flex;
    align-items: stretch;
    z-index: 100;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--hint);
    font-family: var(--font);
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .4px;
    cursor: pointer;
    transition: color .2s;
    padding: 0;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn .nav-icon { font-size: 22px; line-height: 1; }

  /* FAB */
  .fab {
    position: fixed;
    right: 20px;
    bottom: calc(76px + var(--safe-b));
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--accent-t);
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--accent)66;
    transition: transform .15s, box-shadow .15s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99;
  }
  .fab:active { transform: scale(.92); box-shadow: 0 2px 10px var(--accent)44; }

  /* ──────────────────── Empty state ──────────────────── */
  .empty {
    text-align: center;
    padding: 60px 20px;
  }
  .empty-icon { font-size: 52px; margin-bottom: 14px; }
  .empty-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .empty-sub { font-size: 14px; color: var(--hint); line-height: 1.5; }

  /* ──────────────────── Toast ──────────────────── */
  .toast {
    position: fixed;
    bottom: calc(76px + var(--safe-b) + 10px);
    left: 50%; transform: translateX(-50%) translateY(0);
    background: #2a2a35;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 20px;
    border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    z-index: 200;
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* ──────────────────── Loading ──────────────────── */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 120px;
    color: var(--hint);
    gap: 8px;
    font-size: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--hint);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  /* ──────────────────── Confirm overlay ──────────────────── */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.6);
    z-index: 300;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .sheet {
    width: 100%;
    background: var(--bg2);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px calc(20px + var(--safe-b));
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
  }
  .overlay.show .sheet { transform: translateY(0); }
  .sheet-title {
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 8px;
  }
  .sheet-sub {
    font-size: 14px;
    color: var(--hint);
    text-align: center;
    margin-bottom: 20px;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .record-card, .cat-card {
    animation: fadeUp .3s ease both;
  }

  /* ──────────────────── Reminder button ──────────────────── */
  .reminder-pick-btn {
    width: 100%;
    background: var(--bg2);
    border: 1.5px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    text-align: left;
    transition: border-color .2s;
  }
  .reminder-pick-btn.has-date { border-color: var(--accent); color: var(--link); }
  .reminder-pick-btn .clear-x {
    margin-left: auto;
    color: var(--hint);
    font-size: 14px;
    padding: 2px 4px;
  }

  /* ──────────────────── Calendar overlay ──────────────────── */
  .cal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    z-index: 400;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s;
  }
  .cal-overlay.show { opacity: 1; pointer-events: all; }
  .cal-sheet {
    width: 100%;
    background: var(--bg2);
    border-radius: 20px 20px 0 0;
    padding: 0 0 calc(16px + var(--safe-b));
    transform: translateY(100%);
    transition: transform .32s cubic-bezier(.32,.72,0,1);
    max-height: 92vh;
    overflow-y: auto;
  }
  .cal-overlay.show .cal-sheet { transform: translateY(0); }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 10px;
    position: sticky;
    top: 0;
    background: var(--bg2);
    z-index: 1;
  }
  .cal-month-label {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -.3px;
  }
  .cal-nav {
    background: var(--bg);
    border: none;
    color: var(--text);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity .15s;
  }
  .cal-nav:active { opacity: .6; }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    padding: 0 12px;
    margin-bottom: 4px;
  }
  .cal-wd {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 6px 0;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    padding: 0 12px;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, transform .1s;
    position: relative;
    border: none;
    background: none;
    color: var(--text);
    gap: 1px;
  }
  .cal-day:active { transform: scale(.88); }
  .cal-day.other-month { color: var(--hint); opacity: .4; }
  .cal-day.today { color: var(--accent); font-weight: 700; }
  .cal-day.today::after {
    content: '';
    position: absolute;
    bottom: 4px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }
  .cal-day.selected {
    background: var(--accent);
    color: var(--accent-t);
    font-weight: 700;
  }
  .cal-day.selected::after { display: none; }
  .cal-day.past { opacity: .3; pointer-events: none; }
  .cal-day-emoji { font-size: 10px; line-height: 1; }

  /* Emoji picker */
  .emoji-section {
    padding: 16px 16px 8px;
    border-top: 1px solid rgba(255,255,255,.06);
    margin-top: 12px;
  }
  .emoji-section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 10px;
  }
  .emoji-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .emoji-opt {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: 2px solid transparent;
    background: var(--bg);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color .15s, transform .1s;
  }

<script>
// ──────────────────── Telegram WebApp init ────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation();
}
const initData = tg?.initData || '';

// ──────────────────── API ────────────────────
const API = '';   // same origin — backend serves this file

async function apiDelete(path) {
  const res = await fetch(API + path, {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json', 'X-Init-Data': initData }
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function api(method, path, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'X-Init-Data': initData }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

const GET    = (p)      => api('GET',    p);
const POST   = (p, b)   => api('POST',   p, b);
const PUT    = (p, b)   => api('PUT',    p, b);
const DELETE = (p)      => api('DELETE', p);

// ──────────────────── State ────────────────────
let state = {
  records:       [],
  categories:    [],
  stats:         null,
  currentCat:    null,
  editRecord:    null,
  screenStack:   [],
  _reminderDate: null,
  _reminderEmoji:'🔔',
  _formRating:   0,
  _formCat:      null,
  _formPhoto:    null,
  customCategories: [],
};

// Category colors (CSS variable per card)
const CAT_COLORS = {
  '🎬 Фильмы':          '#ff6b6b',
  '🍳 Рецепты':         '#ffd93d',
  '🎵 Музыка':          '#6bcb77',
  '🎁 Подарки':         '#ff6bb5',
  '👕 Одежда':          '#4d96ff',
  '📍 Интересные места':'#c77dff',
};

// ──────────────────── Navigation ────────────────────
function showScreen(id) {
  const next = document.getElementById(id);
  if (!next) return;
  // If already active — do nothing
  if (next.classList.contains('active')) return;
  document.querySelectorAll('.screen.active').forEach(s => {
    s.classList.add('slide-out');
    setTimeout(() => s.classList.remove('active', 'slide-out'), 260);
  });
  next.classList.add('active');
  next.style.transform = 'translateX(24px)';
  requestAnimationFrame(() => { next.style.transform = ''; });
}

function setNavActive(id) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById(id);
  if (btn) btn.classList.add('active');
}

async function showHome() {
  setNavActive('nav-home');
  showScreen('screen-home');
  await loadHome();
}

function showAdd() {
  setNavActive('nav-add');
  state.editRecord = null;
  document.getElementById('form-title').textContent = 'Новая заметка';
  document.getElementById('form-submit').textContent = 'Сохранить';
  clearForm();
  showScreen('screen-form');
}

async function showStats() {
  setNavActive('nav-stats');
  showScreen('screen-stats');
  await loadStats();
}

function showCat(cat) {
  state.currentCat = cat;
  setNavActive('');
  document.getElementById('cat-title').textContent = cat;
  showScreen('screen-cat');
  loadCategoryRecords(cat);
}

function showDetail(record) {
  document.getElementById('detail-back').onclick = () => {
    state.currentCat ? showCat(state.currentCat) : showHome();
  };
  renderDetail(record);
  showScreen('screen-detail');
}

// ──────────────────── Load data ────────────────────
async function loadHome() {
  loadCustomCategories();
  try {
    const [{ records }, { by_category, total }, catsData] = await Promise.all([
      GET('/api/records?limit=6'),
      GET('/api/stats'),
      GET('/api/categories'),
    ]);
    const categories = catsData.system || catsData.categories || [];
    state.records    = records;
    state.stats      = by_category;
    state.categories = categories;

    renderStatsRow(by_category, total);
    renderCatGrid(by_category, categories);
    renderRecentList(records);
    document.getElementById('home-sub').textContent =
      total ? `${total} заметок в коллекции` : 'Пока нет заметок';
  } catch (e) {
    showToast('Ошибка загрузки: ' + e.message);
  }
}

async function loadCategoryRecords(cat) {
  document.getElementById('cat-records').innerHTML = loaderHTML();
  try {
    const { records, count } = await GET(`/api/records?category=${encodeURIComponent(cat)}`);
    document.getElementById('cat-sub').textContent = `${count} заметок`;
    if (!records.length) {
      document.getElementById('cat-records').innerHTML = emptyHTML('📭', 'Пусто', 'В этой категории нет заметок. Добавь первую!');
      return;
    }
    document.getElementById('cat-records').innerHTML = '';
    records.forEach((r, i) => {
      const el = recordCard(r);
      el.style.animationDelay = `${i * 40}ms`;
      document.getElementById('cat-records').appendChild(el);
    });
  } catch (e) {
    showToast(e.message);
  }
}

async function loadStats() {
  document.getElementById('stats-content').innerHTML = loaderHTML();
  try {
    const { by_category, total } = await GET('/api/stats');
    renderStatsScreen(by_category, total);
  } catch (e) {
    showToast(e.message);
  }
}

// ──────────────────── Renderers ────────────────────
function renderStatsRow(by_cat, total) {
  const cats = Object.keys(by_cat).length;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat-pill"><span class="num">${total}</span><span class="lbl">Заметок</span></div>
    <div class="stat-pill"><span class="num">${cats}</span><span class="lbl">Категорий</span></div>
    <div class="stat-pill"><span class="num">${total ? Math.max(...Object.values(by_cat)) : 0}</span><span class="lbl">Максимум</span></div>
  `;
}

function renderCatGrid(by_cat, categories) {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  categories.forEach((cat, i) => {
    const count = by_cat[cat] || 0;
    const emoji = cat.split(' ')[0];
    const name  = cat.slice(emoji.length + 1);
    const color = CAT_COLORS[cat] || 'var(--accent)';
    const div   = document.createElement('div');
    div.className = 'cat-card';
    div.style.cssText = `--cat-color:${color}; animation-delay:${i * 50}ms`;
    div.innerHTML = `
      <span class="cat-emoji">${emoji}</span>
      <span class="cat-name">${name}</span>
      <span class="cat-count">${count} заметок</span>
      <div class="cat-dot"></div>
    `;
    div.onclick = () => showCat(cat);
    grid.appendChild(div);
  });
}

function renderRecentList(records) {
  const list = document.getElementById('recent-list');
  const label = document.getElementById('recent-label');
  if (!records.length) {
    label.style.display = 'none';
    list.innerHTML = emptyHTML('✨', 'Начни коллекцию', 'Нажми + чтобы добавить первую заметку');
    return;
  }
  label.style.display = 'block';
  list.innerHTML = '';
  records.forEach((r, i) => {
    const el = recordCard(r);
    el.style.animationDelay = `${i * 50}ms`;
    list.appendChild(el);
  });
}

function recordCard(record) {
  const div = document.createElement('div');
  div.className = 'record-card';

  const stars    = record.rating ? '⭐'.repeat(record.rating) : '';
  const tagsStr  = record.tags?.map(t => '#' + t).join(' ') || '';
  const dateStr  = formatDate(record.created_at);
  const catColor = CAT_COLORS[record.category] || 'var(--accent)';
  const emoji    = record.category?.split(' ')[0] || '';

  div.innerHTML = `
    <div class="record-body">
      <div class="record-cat-badge" style="color:${catColor}">${emoji} ${record.category?.slice(emoji.length+1)}</div>
      <div class="record-title">${esc(record.title)}</div>
      <div class="record-desc">${esc(record.description)}</div>
      <div class="record-meta">
        ${stars ? `<span class="record-stars">${stars}</span>` : ''}
        ${tagsStr ? `<span class="record-tags">${esc(tagsStr)}</span>` : ''}
        <span class="record-date">${dateStr}</span>
      </div>
    </div>
  `;
  div.onclick = () => showDetail(record);
  return div;
}

function renderDetail(record) {
  const stars = record.rating ? '⭐'.repeat(record.rating) : '';
  const color = CAT_COLORS[record.category] || 'var(--accent)';
  let html = '';

  if (record.photo) html += `<img class="detail-photo" src="${record.photo}" alt="">`;
  html += `<div class="detail-cat" style="background:${color}22;color:${color}">${esc(record.category)}</div>`;
  html += `<div class="detail-title">${esc(record.title)}</div>`;
  if (stars) html += `<span class="detail-stars">${stars}</span>`;
  html += `<div class="detail-date">📅 ${formatDate(record.created_at)}</div>`;

  html += `<div class="detail-block">
    <div class="detail-block-label">Описание</div>
    <div class="detail-block-text">${esc(record.description)}</div>
  </div>`;

  if (record.link) {
    html += `<div class="detail-block">
      <div class="detail-block-label">Ссылка</div>
      <a class="detail-link" href="${esc(record.link)}" target="_blank">${esc(record.link)}</a>
    </div>`;
  }

  if (record.tags?.length) {
    html += `<div class="detail-block">
      <div class="detail-block-label">Теги</div>
      <div class="detail-tags">${record.tags.map(t => `<span class="tag-pill">#${esc(t)}</span>`).join('')}</div>
    </div>`;
  }

  html += `<div style="padding:0 0 8px">
    <button class="share-btn" onclick="shareRecord('${record.id}')">
      📤 Поделиться — отправить карточку в Telegram
    </button>
  </div>`;
  html += `<div class="detail-actions">
    <button class="btn btn-ghost" onclick="editRecord('${record.id}')">✏️ Изменить</button>
    <button class="btn btn-danger" onclick="confirmDelete('${record.id}', '${esc(record.title)}')">🗑</button>
  </div>`;

  document.getElementById('detail-content').innerHTML = html;
  document.querySelector('#detail-content').dataset.recordId = record.id;
}

function renderStatsScreen(by_cat, total) {
  if (!total) {
    document.getElementById('stats-content').innerHTML =
      emptyHTML('📊', 'Нет данных', 'Добавь первую заметку и статистика появится здесь');
    return;
  }
  const max = Math.max(...Object.values(by_cat));
  let html = `<div class="stats-row">
    <div class="stat-pill"><span class="num">${total}</span><span class="lbl">Всего</span></div>
    <div class="stat-pill"><span class="num">${Object.keys(by_cat).length}</span><span class="lbl">Категорий</span></div>
  </div>`;
  html += '<div class="section-label">По категориям</div>';

  const sorted = Object.entries(by_cat).sort((a, b) => b[1] - a[1]);
  sorted.forEach(([cat, count]) => {
    const pct   = Math.round(count / max * 100);
    const color = CAT_COLORS[cat] || 'var(--accent)';
    html += `
      <div class="detail-block" style="margin-bottom:8px;cursor:pointer" onclick="showCat('${esc(cat)}')">
        <div style="display:flex;justify-content:space-between;margin-bottom:8px">
          <span style="font-weight:600">${esc(cat)}</span>
          <span style="color:var(--hint)">${count}</span>
        </div>
        <div style="height:6px;background:var(--bg);border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${color};border-radius:3px;transition:width .6s ease"></div>
        </div>
      </div>`;
  });
  document.getElementById('stats-content').innerHTML = html;
}

// ──────────────────── Form ────────────────────
function clearForm() {
  document.getElementById('form-title-in').value = '';
  document.getElementById('form-desc').value     = '';
  document.getElementById('form-link').value     = '';
  document.getElementById('form-tags').value     = '';
  clearReminder(null);
  document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.cat-pick-btn').forEach(b => b.classList.remove('selected'));
  state._formRating  = 0;
  state._formCat     = null;
  state._formPhoto   = null;
  state._reminderDate  = null;
  state._reminderEmoji = '🔔';

}

function fillFormForEdit(record) {
  state.editRecord = record;
  state._formCat    = record.category;
  state._formRating = record.rating || 0;

  document.getElementById('form-title').textContent    = 'Редактирование';
  document.getElementById('form-submit').textContent   = 'Сохранить изменения';
  document.getElementById('form-title-in').value = record.title;
  document.getElementById('form-desc').value     = record.description;
  document.getElementById('form-link').value     = record.link || '';
  document.getElementById('form-tags').value     = record.tags?.join(', ') || '';

  document.querySelectorAll('.cat-pick-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.cat === record.category);
  });
  document.querySelectorAll('.star-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.v <= record.rating);
  });
  showScreen('screen-form');
}

async function editRecord(id) {
  try {
    const record = await GET(`/api/records/${id}`);
    fillFormForEdit(record);
  } catch (e) {
    showToast(e.message);
  }
}

// ──────────────────── Form submit ────────────────────
document.getElementById('form-submit').onclick = async () => {
  const title = document.getElementById('form-title-in').value.trim();
  const desc  = document.getElementById('form-desc').value.trim();
  const link  = document.getElementById('form-link').value.trim();
  const tags  = document.getElementById('form-tags').value.split(',').map(t => t.trim().replace(/\s+/g, '_')).filter(Boolean);
  const reminder = state._reminderDate ? state._reminderDate.toISOString() : null;

  if (!state._formCat) { showToast('Выбери категорию'); return; }
  if (!title)          { showToast('Напиши название');   return; }
  if (!desc)           { showToast('Добавь описание');   return; }

  const btn = document.getElementById('form-submit');
  btn.disabled = true;
  btn.textContent = '…';

  try {
    if (state.editRecord) {
      await PUT(`/api/records/${state.editRecord.id}`, {
        title, description: desc, link: link || null,
        rating: state._formRating, tags,
      });
      showToast('✅ Запись обновлена!');
    } else {
      await POST('/api/records', {
        category: state._formCat, title, description: desc,
        link: link || null, photo: state._formPhoto || null,
        rating: state._formRating, tags,
        reminder_date:  state._reminderDate ? state._reminderDate.toISOString() : null,
        reminder_time:  state._reminderTime  || '09:00',
        repeat_type:    state._reminderRepeat || null,
        reminder_emoji: state._reminderEmoji  || '🔔',
      });
      if (state._reminderDate) {
        const d = state._reminderDate;
        const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
        showToast('✅ Добавлено! ⏰ Напомню ' + d.getDate() + ' ' + months[d.getMonth()]);
      } else {
        showToast('✅ Заметка добавлена!');
      }
      if (tg) tg.HapticFeedback?.notificationOccurred('success');
    }
    clearForm();
    showHome();
  } catch (e) {
    showToast('Ошибка: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = state.editRecord ? 'Сохранить изменения' : 'Сохранить';
  }
};

// ──────────────────── Helpers ────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleDateString('ru-RU', {day:'2-digit', month:'short', year:'numeric'});
  } catch { return ''; }
}

function loaderHTML() {
  return `<div class="loader"><div class="spinner"></div> Загрузка…</div>`;
}

function emptyHTML(icon, title, sub) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div><div class="empty-sub">${sub}</div></div>`;
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}



// ──────────────────── Calendar ────────────────────
const EMOJI_OPTIONS = ['⭐','🔥','💡','📌','🎯','🎬','🍕','🎵','🎁','👕','📍','❤️','✅','🚀','💎','🌟','📚','🏆','🌈','⚡'];
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

let _calDate      = new Date();   // currently viewed month
let _calSelected  = null;         // selected Date object
let _calEmoji     = '🔔';

function openCalendar() {
  _calDate     = new Date();
  _calSelected = state._reminderDate || null;
  _calEmoji    = state._reminderEmoji || '🔔';
  // Reset time/repeat to current state
  const timeEl = document.getElementById('cal-time');
  const repEl  = document.getElementById('cal-repeat');
  if (timeEl) timeEl.value   = state._reminderTime   || '09:00';
  if (repEl)  repEl.value    = state._reminderRepeat || '';
  renderCalendar();
  renderEmojiGrid();
  const overlay = document.getElementById('cal-overlay');
  overlay.style.opacity       = '';
  overlay.style.pointerEvents = '';
  void overlay.offsetHeight; // force reflow
  overlay.classList.add('show');
}

function closeCalendar() {
  const overlay = document.getElementById('cal-overlay');
  overlay.classList.remove('show');
  overlay.style.opacity       = '0';
  overlay.style.pointerEvents = 'none';
}

function renderCalendar() {
  const y = _calDate.getFullYear();
  const m = _calDate.getMonth();
  document.getElementById('cal-month-label').textContent = MONTHS_RU[m] + ' ' + y;

  const today    = new Date(); today.setHours(0,0,0,0);
  const firstDay = new Date(y, m, 1);
  const lastDay  = new Date(y, m+1, 0);

  // Monday-first offset
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Prev month padding
  for (let i = startOffset - 1; i >= 0; i--) {
    const d = new Date(y, m, -i);
    grid.appendChild(makeDayBtn(d, true, today));
  }
  // Current month
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const date = new Date(y, m, d);
    grid.appendChild(makeDayBtn(date, false, today));
  }
  // Next month padding
  const total = startOffset + lastDay.getDate();
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= remaining; d++) {
    const date = new Date(y, m+1, d);
    grid.appendChild(makeDayBtn(date, true, today));
  }

  updateConfirmBtn();
}

function makeDayBtn(date, otherMonth, today) {
  const btn = document.createElement('button');
  btn.className = 'cal-day';

  const isPast     = date < today;
  const isToday    = date.getTime() === today.getTime();
  const isSelected = _calSelected && date.toDateString() === _calSelected.toDateString();

  if (otherMonth) btn.classList.add('other-month');
  if (isToday)    btn.classList.add('today');
  if (isSelected) btn.classList.add('selected');
  if (isPast && !isToday) btn.classList.add('past');

  btn.innerHTML = '<span>' + date.getDate() + '</span>' +
    (isSelected ? '<span class="cal-day-emoji">' + _calEmoji + '</span>' : '');

  if (!isPast || isToday) {
    btn.onclick = () => {
      _calSelected = new Date(date);
      renderCalendar();
    };
  }
  return btn;
}

function renderEmojiGrid() {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  EMOJI_OPTIONS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt' + (e === _calEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => {
      _calEmoji = e;
      document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      renderCalendar();   // refresh to show emoji on selected day
    };
    grid.appendChild(btn);
  });
}

function updateConfirmBtn() {
  const btn = document.getElementById('cal-confirm');
  if (_calSelected) {
    const d = _calSelected;
    const label = d.getDate() + ' ' + MONTHS_RU[d.getMonth()] + ' ' + d.getFullYear();
    btn.textContent = _calEmoji + '  ' + label;
    btn.disabled = false;
  } else {
    btn.textContent = 'Выбрать дату';
    btn.disabled = true;
  }
}

document.getElementById('cal-prev').onclick = () => {
  _calDate.setMonth(_calDate.getMonth() - 1);
  renderCalendar();
};
document.getElementById('cal-next').onclick = () => {
  _calDate.setMonth(_calDate.getMonth() + 1);
  renderCalendar();
};

document.getElementById('cal-confirm').onclick = () => {
  if (!_calSelected) return;
  const timeVal   = document.getElementById('cal-time').value || '09:00';
  const repeatVal = document.getElementById('cal-repeat').value || null;

  state._reminderDate   = new Date(_calSelected.getTime());
  state._reminderEmoji  = _calEmoji;
  state._reminderTime   = timeVal;
  state._reminderRepeat = repeatVal;

  const d      = _calSelected;
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  let   label  = d.getDate() + ' ' + months[d.getMonth()] + ', ' + timeVal;
  if (repeatVal === 'weekly')  label += ' · каждую нед.';
  if (repeatVal === 'monthly') label += ' · каждый мес.';

  const btn = document.getElementById('reminder-pick-btn');
  btn.classList.add('has-date');
  document.getElementById('reminder-pick-icon').textContent = _calEmoji;
  document.getElementById('reminder-pick-text').textContent = label;
  document.getElementById('reminder-pick-clear').style.display = 'inline';
  closeCalendar();
};

// Close on backdrop click
document.getElementById('cal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCalendar();
});

function clearReminder(e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  state._reminderDate   = null;
  state._reminderEmoji  = '🔔';
  state._reminderTime   = '09:00';
  state._reminderRepeat = null;
  try {
    const btn = document.getElementById('reminder-pick-btn');
    if (btn) btn.classList.remove('has-date');
    const icon = document.getElementById('reminder-pick-icon');
    if (icon) icon.textContent = '🔔';
    const text = document.getElementById('reminder-pick-text');
    if (text) text.textContent = 'Выбрать дату напоминания';
    const clr = document.getElementById('reminder-pick-clear');
    if (clr) clr.style.display = 'none';
  } catch(err) {}
}

// ──────────────────── Image upload ────────────────────
function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('Фото не больше 5 МБ'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result;
    state._formPhoto = b64;
    document.getElementById('img-preview').src = b64;
    document.getElementById('img-preview').classList.add('show');
    document.getElementById('img-upload-hint').style.display = 'none';
    document.getElementById('img-upload-area').classList.add('has-image');
    document.getElementById('img-remove-btn').classList.add('show');
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  state._formPhoto = null;
  document.getElementById('img-preview').src = '';
  document.getElementById('img-preview').classList.remove('show');
  document.getElementById('img-upload-hint').style.display = '';
  document.getElementById('img-upload-area').classList.remove('has-image');
  document.getElementById('img-remove-btn').classList.remove('show');
  document.getElementById('img-file-input').value = '';
}

// ──────────────────── Custom categories ────────────────────
const SUGGESTED_CATS = [
  {emoji:'📚',name:'Книги'},{emoji:'✈️',name:'Путешествия'},{emoji:'💪',name:'Спорт'},
  {emoji:'💊',name:'Здоровье'},{emoji:'💼',name:'Работа'},{emoji:'🎮',name:'Игры'},
  {emoji:'🛒',name:'Покупки'},{emoji:'🍷',name:'Рестораны'},{emoji:'🎨',name:'Творчество'},
  {emoji:'💰',name:'Финансы'},{emoji:'🌿',name:'Природа'},{emoji:'🐾',name:'Питомцы'},
];
const CAT_EMOJIS = ['📁','📚','✈️','💪','💊','💼','🎮','🛒','🍷','🎨','💰','🌿',
                    '🐾','🎯','🔬','🎭','🏠','🚗','☀️','🌙','⚽','🎸','🧩','🎪'];
let _newCatEmoji = '📁';

async function loadCustomCategories() {
  try {
    const data = await GET('/api/categories');
    state.customCategories = data.custom || [];
    renderCustomCategories();
  } catch(e) { state.customCategories = []; }
}

function renderCustomCategories() {
  const list = document.getElementById('custom-cats-list');
  if (!list) return;
  const cats = state.customCategories || [];
  if (!cats.length) {
    list.innerHTML = '<div style="color:var(--hint);font-size:13px;padding:4px 0 8px">Нет своих категорий</div>';
    return;
  }
  list.innerHTML = cats.map(cat => `
    <div class="custom-cat-card" onclick="showCatByName('${esc(cat.emoji + ' ' + cat.name)}','${esc(cat.id)}')">
      <div class="custom-cat-emoji" style="background:${cat.color || 'var(--bg)'}">
        ${cat.emoji}
      </div>
      <div>
        <div style="font-weight:600;font-size:15px">${esc(cat.emoji)} ${esc(cat.name)}</div>
        <div style="font-size:12px;color:var(--hint);margin-top:2px">Своя категория</div>
      </div>
      <button type="button" class="custom-cat-del" onclick="event.stopPropagation();deleteCat('${cat.id}')">✕</button>
    </div>`).join('');
}

function openCreateCat() {
  // Fill suggested
  const sg = document.getElementById('suggested-cats');
  sg.innerHTML = SUGGESTED_CATS.map(c =>
    `<button type="button" class="suggested-cat-btn" onclick="pickSuggestedCat('${c.emoji}','${c.name}')">
      ${c.emoji} ${c.name}
    </button>`).join('');

  // Fill emoji picker
  _newCatEmoji = '📁';
  const ep = document.getElementById('cat-emoji-picker');
  ep.innerHTML = CAT_EMOJIS.map(e =>
    `<button type="button" class="cat-emoji-opt${e===_newCatEmoji?' selected':''}" onclick="pickCatEmoji('${e}')">${e}</button>`
  ).join('');

  document.getElementById('new-cat-name').value = '';
  const ov = document.getElementById('create-cat-overlay');
  ov.style.opacity = ''; ov.style.pointerEvents = '';
  ov.classList.add('show');
}

function closeCreateCat() {
  const ov = document.getElementById('create-cat-overlay');
  ov.classList.remove('show');
  ov.style.opacity = '0'; ov.style.pointerEvents = 'none';
}

function pickSuggestedCat(emoji, name) {
  document.getElementById('new-cat-name').value = name;
  pickCatEmoji(emoji);
}

function pickCatEmoji(emoji) {
  _newCatEmoji = emoji;
  document.querySelectorAll('.cat-emoji-opt').forEach(b => {
    b.classList.toggle('selected', b.textContent.trim() === emoji);
  });
}

document.getElementById('create-cat-btn').onclick = async () => {
  const name = document.getElementById('new-cat-name').value.trim();
  if (!name) { showToast('Введи название'); return; }
  try {
    await POST('/api/categories', {name, emoji: _newCatEmoji});
    showToast('✅ Категория создана!');
    closeCreateCat();
    await loadCustomCategories();
  } catch(e) { showToast('Ошибка создания'); }
};

async function deleteCat(id) {
  try {
    await apiDelete('/api/categories/' + id);
    showToast('🗑 Категория удалена');
    await loadCustomCategories();
  } catch(e) { showToast('Ошибка'); }
}

function showCatByName(catName, customId) {
  state.currentCat = catName;
  state.currentCatId = customId || null;
  document.getElementById('cat-title').textContent = catName;
  showScreen('screen-cat');
  setNavActive(null);
  loadCategoryRecords(catName);
}

// ──────────────────── Improved reminders screen ────────────────────
async function loadReminders() {
  const sub  = document.getElementById('reminders-sub');
  const list = document.getElementById('reminders-list');
  list.innerHTML = '<div class="loader"><div class="spinner"></div> Загрузка…</div>';
  try {
    // Load both active and inactive
    const [activeData, allData] = await Promise.all([
      GET('/api/reminders'),
      GET('/api/reminders?include_inactive=true'),
    ]);
    const active   = (activeData.reminders  || []);
    const inactive = (allData.reminders     || []).filter(r => !r.is_active);
    sub.textContent = active.length + ' активных';

    const now = new Date();
    const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
    const repeatLabel = {weekly:'🔁 каждую неделю', monthly:'🔁 каждый месяц'};

    function renderCard(r) {
      const d     = new Date(r.remind_at);
      const diff  = (d - now) / (1000 * 60 * 60 * 24); // days
      const label = d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      const time  = r.remind_time ? ' в ' + r.remind_time : '';
      const rep   = r.repeat_type ? `<div class="reminder-repeat">${repeatLabel[r.repeat_type]||''}</div>` : '';

      let urgency = 'ok', dateClass = 'ok';
      if (!r.is_active)   { urgency = 'inactive'; dateClass = ''; }
      else if (diff <= 2) { urgency = 'urgent';   dateClass = 'urgent'; }
      else if (diff <= 7) { urgency = 'warning';  dateClass = 'warning'; }

      return `
        <div class="reminder-card ${urgency}">
          <div class="reminder-emoji-badge">${r.emoji||'🔔'}</div>
          <div class="reminder-info">
            <div class="reminder-title">${escHtml(r.record_title)}</div>
            <div class="reminder-cat">${escHtml(r.record_cat)}</div>
            <div class="reminder-date ${dateClass}">📅 ${label}${time}</div>
            ${rep}
          </div>
          ${r.is_active ? `<button type="button" class="reminder-del-btn" onclick="deleteReminder('${r.id}')">✕</button>` : ''}
        </div>`;
    }

    let html = '';
    if (!active.length && !inactive.length) {
      html = `<div class="reminders-empty">
        <div class="empty-icon">⏰</div>
        <div>Нет напоминаний</div>
        <div style="margin-top:8px;font-size:12px">Добавь заметку с датой напоминания</div>
      </div>`;
    } else {
      if (active.length) {
        html += '<div class="reminders-section-label">🟢 Активные</div>';
        html += active.map(renderCard).join('');
      }
      if (inactive.length) {
        html += '<div class="reminders-section-label" style="margin-top:20px">⚫ Прошедшие</div>';
        html += inactive.map(renderCard).join('');
      }
    }
    list.innerHTML = html;
  } catch(e) {
    list.innerHTML = '<div class="reminders-empty"><div>Ошибка загрузки</div></div>';
  }
}
// ──────────────────── Boot ────────────────────
initCatPicker();
loadHome();
</script>
